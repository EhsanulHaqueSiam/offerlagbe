[build]
  command = "npx convex deploy --cmd 'npx vite build' --cmd-url-env-var-name VITE_CONVEX_URL"
  publish = "dist"

# Vite hashed assets — immutable, cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker — always revalidate
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Icons + manifest — 1 day + stale-while-revalidate 7 days
[[headers]]
  for = "/icon-*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self)"

# Edge function for dynamic OG meta tags
[[edge_functions]]
  function = "og-meta"
  path = "/offer/*"

# SPA fallback — all routes serve index.html (static assets served first automatically)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
